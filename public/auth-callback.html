<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opening EchoLingo…</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #0f172a;
      }
      .wrap {
        width: min(92vw, 460px);
        text-align: center;
        padding: 32px 24px;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        box-shadow: 0 14px 34px rgba(15, 23, 42, 0.08);
      }
      .logo {
        width: 88px;
        height: 88px;
        margin: 0 auto 18px;
        border-radius: 24px;
        object-fit: cover;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.4rem;
      }
      p {
        margin: 0 0 18px;
        color: #475569;
        line-height: 1.55;
      }
      a {
        display: inline-block;
        text-decoration: none;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: #fff;
        padding: 12px 18px;
        border-radius: 14px;
        font-weight: 600;
      }
      .sub {
        margin-top: 14px;
        font-size: 0.9rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <img class="logo" src="/favicon.svg" alt="EchoLingo" />
      <h1>Opening EchoLingo…</h1>
      <p>If the app does not open automatically, tap the button below to continue in EchoLingo.</p>
      <a id="open-app" href="#">Open EchoLingo</a>
      <div class="sub">You can return to this page safely after confirming your email.</div>
    </main>

    <script>
      (function () {
        const query = window.location.search || "";
        const hash = window.location.hash || "";
        const deepLink = `echolingo://auth/callback${query}${hash}`;
        const btn = document.getElementById("open-app");
        btn.href = deepLink;

        // Try to hand off automatically first.
        window.location.replace(deepLink);

        // If the browser blocks or ignores it, the manual button remains.
        setTimeout(() => {
          btn.focus();
        }, 1200);
      })();
    </script>
  </body>
</html>
